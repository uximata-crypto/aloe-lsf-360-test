<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Aloe LSF 360 — Desenho 3D</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <img src="assets/aloe-lsf-360-logo.svg" alt="Aloe LSF 360">
      <div>
        <strong>Aloe <span>LSF 360</span></strong>
        <small>Arquitetura · Estrutura · Fabrico</small>
      </div>
    </div>
    <nav id="mainMenu">
      <button data-action="new">Novo</button>
      <button data-action="open">Abrir</button>
      <button data-action="save">Salvar como</button>
      <button data-action="import">Importar</button>
      <button data-action="export">Exportar</button>
      <button data-action="location">Localização</button>
      <button data-action="print">Imprimir</button>
    </nav>
    <div class="header-actions">
      <button class="pill" id="toggleMode">2D / 3D</button>
      <button class="pill" id="togglePanel">Painel</button>
    </div>
  </header>

  <section class="toolstrip" id="toolstrip">
    <button class="tool active" data-tool="select"><b>⌖</b><span>Selecionar</span></button>
    <button class="tool" data-tool="line"><b>╱</b><span>Linha</span></button>
    <button class="tool" data-tool="rect"><b>▭</b><span>Retângulo</span></button>
    <button class="tool" data-tool="circle"><b>◯</b><span>Círculo</span></button>
    <button class="tool" data-tool="polygon"><b>⬠</b><span>Polígono</span></button>
    <button class="tool" data-tool="push"><b>↕</b><span>Empurrar/Puxar</span></button>
    <button class="tool" data-tool="move"><b>✥</b><span>Mover</span></button>
    <button class="tool" data-tool="orbit"><b>◉</b><span>Órbita</span></button>
    <button class="tool" data-tool="delete"><b>⌫</b><span>Apagar</span></button>
    <button class="tool green" id="genLSF"><b>▦</b><span>Gerar LSF</span></button>
    <button class="tool green" id="genCSV"><b>CSV</b><span>Gerar CSV</span></button>
    <button class="tool" id="fitView"><b>◎</b><span>Ajustar 3D</span></button>
  </section>

  <main class="main">
    <aside class="leftbar">
      <button class="side active" data-tool="select">⌖<small>Selecionar</small></button>
      <button class="side" data-tool="line">╱<small>Linha</small></button>
      <button class="side" data-tool="rect">▭<small>Retângulo</small></button>
      <button class="side" data-tool="circle">◯<small>Círculo</small></button>
      <button class="side" data-tool="polygon">⬠<small>Polígono</small></button>
      <button class="side" data-tool="push">↕<small>Empurrar</small></button>
      <button class="side" data-tool="move">✥<small>Mover</small></button>
      <button class="side" data-tool="orbit">◉<small>Órbita</small></button>
      <button class="side" data-tool="delete">⌫<small>Apagar</small></button>
    </aside>

    <section class="workspace">
      <div class="canvas-top">
        <span id="badge">Vista 3D — Desenho em planos</span>
        <div class="mode-switch"><button id="b2">2D</button><button id="b3" class="active">3D</button></div>
      </div>
      <svg id="viewport" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Espaço de desenho 3D"></svg>
      <div class="workplane-card">
        <div class="card-title">Plano de desenho <span id="planeLabel">XY · Chão</span></div>
        <div class="plane-buttons">
          <button data-plane="XY" class="active">XY<br><small>Chão</small></button>
          <button data-plane="XZ">XZ<br><small>Frontal</small></button>
          <button data-plane="YZ">YZ<br><small>Lateral</small></button>
          <button data-plane="FACE">Face<br><small>Selecionada</small></button>
        </div>
        <label>Elevação / deslocamento<input id="planeOffset" type="number" step="0.10" value="0.00"> m</label>
      </div>
      <div class="layers-card">
        <div class="card-title">Camadas</div>
        <label><input checked type="checkbox" data-layer="grid"> Grelha do plano</label>
        <label><input checked type="checkbox" data-layer="shapes"> Desenho / volumes</label>
        <label><input checked type="checkbox" data-layer="lsf"> Estrutura LSF</label>
        <label><input checked type="checkbox" data-layer="labels"> Etiquetas</label>
      </div>
      <div class="hint" id="hint">Plano XY ativo. Escolha uma ferramenta e desenhe diretamente no espaço 3D.</div>
      <div class="toast hidden" id="toast"></div>
    </section>

    <aside class="rightpanel" id="rightpanel">
      <div class="panel-head"><strong>Aloe LSF 360</strong><button id="closePanel">×</button></div>
      <div class="tabs" id="tabs">
        <button class="tab active" data-tab="entity">Entidade</button>
        <button class="tab" data-tab="selection">Seleção</button>
        <button class="tab" data-tab="profiles">Perfis</button>
        <button class="tab" data-tab="geo">Geolocalização</button>
        <button class="tab" data-tab="csv">CSV</button>
      </div>
      <div id="panelBody"></div>
    </aside>
  </main>

  <footer class="status">
    <span id="coords">X: 0.000 · Y: 0.000 · Z: 0.000</span>
    <span id="toolLabel">Ferramenta: Selecionar</span>
    <span id="selectionLabel">Nenhum objeto selecionado.</span>
  </footer>
</div>
<input id="fileInput" type="file" accept=".json" hidden>
<script src="app.js"></script>
</body>
</html>
